version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./code:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
    depends_on:
      - database
    working_dir: /app

volumes:
  postgres_data:
